<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>www.spicy-momento.com/Login</title>
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
    <video autoplay muted loop class="video-background">
        <source src="images/loginpage/background/vecteezy_smoked-chicken-wings-falling-and-bouncing-in-ultra-slow_1620195.mp4" type="video/mp4">
    </video>
    
    <div class="container">
        <div class="left">
            <img id="logo" src="images/loginpage/background/WhatsApp Image 2024-12-29 at 23.49.36_076b59df.jpg" alt="Logo">
        </div>
        <div class="right">
            <div class="form">
                <h3>WELCOME !</h3>
                <form action="homepage.html">
                    <input type="text" name="username" placeholder="Username" required>
                    <input type="password" name="password" placeholder="Password" required>
                    <button type="submit">Login</button>
                </form>
                <div class="social-login">
                    <button class="google">Sign in with Google</button>
                    <button class="facebook">Sign in with Facebook</button>
                    <button class="phone">Sign in with Phone Number</button>
                </div>
                <p>Don't have an account? <a href="register.html">Register</a></p>
            </div>
        </div>
    </div>
</body>
</html>
