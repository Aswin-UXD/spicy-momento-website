<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>www.spicy-momento.com/register</title>
    <link rel="stylesheet" href="../css/register.css">
</head>
<body>

    <video autoplay muted loop class="video-background">
        <source src="images/loginpage/background/vecteezy_smoked-chicken-wings-falling-and-bouncing-in-ultra-slow_1620195.mp4" type="video/mp4">
    </video>

    <div class="container">
        <div class="left">
            <img id="logo" src="images/loginpage/background/WhatsApp Image 2024-12-29 at 23.49.36_076b59df.jpg" alt="Logo">
        </div>
        <div class="right">
            <div class="form">
                <h3>START YOUR FOOD JOURNEY</h3>
                <form action="login.html">
                    <div class="register-container">
                        <div class="register">
                            <input type="text" name="first-name" placeholder="First Name" required>
                        </div>
                        <div class="register">
                            <input type="text" name="last-name" placeholder="Last Name" required>
                        </div>
                        <div class="register">
                            <input type="text" name="username" placeholder="Username" required>
                        </div>
                        <div class="register">
                            <input type="email" name="email" placeholder="Email Address" required>
                        </div>
                        <div class="register">
                            <input type="password" name="password" placeholder="Password" required>
                        </div>
                        <div class="register">
                            <input type="password" name="confirm-password" placeholder="Confirm Password" required>
                        </div>
                        <div class="register">
                            <label for="student-id">Student ID (for student discounts):</label>
                            <input type="text" name="student-id" id="student-id" placeholder="Enter your student ID (optional)">
                        </div>
                        <div class="register">
                            <label for="favorite-cuisine">Favorite Cuisine:</label>
                            <select         name="favorite-cuisine"         id="favorite-cuisine">
                                <option value="mexican">Mexican</option>
                                <option value="indian">Indian</option>
                                <option value="chinese">Chinese</option>
                                <option value="italian">Italian</option>
                                <option value="brazilian">Brazilian</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        <div class="register">
                            <label for="offer-code">Enter Offer Code (optional):</label>
                            <input type="text" name="offer-code" id="offer-code" placeholder="e.g., SPICY10 for 10% off">
                        </div>
                    </div>
                    <button type="submit">Register</button>
                </form>
                <p>Already have an account? <a href="login.html">Login</a></p>
            </div>
        </div>
    </div>
</body>
</html>
